<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ containerStyle }}">
  <a href="{{ hrefDash }}" style="{{ logoWrapStyle }}">
    <span style="{{ logoFullStyle }}"><span style="color:#24D7CB">Young</span><span style="color:#fff">차</span></span>
    <img src="uploads/YoungCha_Logo%201.svg" alt="Young차" style="{{ logoMiniStyle }}">
  </a>
  <nav style="display:flex;flex-direction:column;gap:5px;flex:1">
    <div style="position:relative" onMouseEnter="{{ hovDash }}" onMouseLeave="{{ hovClear }}">
      <a href="{{ hrefDash }}" style="{{ sDash }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><path d="M5 18a7 7 0 1 1 14 0"/><path d="M12 18l3.6-4.8"/><circle cx="12" cy="18" r="1.3" fill="currentColor"/></svg>
        <span style="{{ labelStyle }}">대시보드</span>
      </a>
      <span style="{{ tipDash }}">대시보드</span>
    </div>
    <div style="position:relative" onMouseEnter="{{ hovBay }}" onMouseLeave="{{ hovClear }}">
      <a href="{{ hrefBay }}" style="{{ sBay }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><path d="M5 13l1.6-4.8A2 2 0 0 1 8.5 7h7a2 2 0 0 1 1.9 1.2L19 13v5h-2v-2H7v2H5z"/><circle cx="8" cy="15.5" r="1.2"/><circle cx="16" cy="15.5" r="1.2"/></svg>
        <span style="{{ labelStyle }}">베이 관리</span>
      </a>
      <span style="{{ tipBay }}">베이 관리</span>
    </div>
    <div style="position:relative" onMouseEnter="{{ hovSale }}" onMouseLeave="{{ hovClear }}">
      <a href="{{ hrefSale }}" style="{{ sSale }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span style="{{ labelStyle }}">타임세일 관리</span>
      </a>
      <span style="{{ tipSale }}">타임세일 관리</span>
    </div>
    <div style="position:relative" onMouseEnter="{{ hovPay }}" onMouseLeave="{{ hovClear }}">
      <a href="{{ hrefPay }}" style="{{ sPay }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><path d="M6 3h12v18l-3-1.6L12 21l-3-1.6L6 21Z"/><path d="M9 8h6"/><path d="M9 12h5"/></svg>
        <span style="{{ labelStyle }}">결제·정산 관리</span>
      </a>
      <span style="{{ tipPay }}">결제·정산 관리</span>
    </div>
    <div style="position:relative" onMouseEnter="{{ hovAi }}" onMouseLeave="{{ hovClear }}">
      <a href="{{ hrefAi }}" style="{{ sAi }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><path d="M4 8V6a2 2 0 0 1 2-2h2"/><path d="M20 8V6a2 2 0 0 0-2-2h-2"/><path d="M4 16v2a2 2 0 0 0 2 2h2"/><path d="M20 16v2a2 2 0 0 1-2 2h-2"/><circle cx="12" cy="12" r="3"/></svg>
        <span style="{{ labelStyle }}">비전 AI 모니터링</span>
      </a>
      <span style="{{ tipAi }}">비전 AI 모니터링</span>
    </div>
  </nav>
  <button onClick="{{ onToggle }}" style="display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.06);border:none;border-radius:12px;padding:11px;color:#8497AE;cursor:pointer;font-size:14px" style-hover="color:#fff">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="{{ arrowStyle }}"><path d="m13 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 240, &quot;height&quot;: 760 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;,&quot;bay&quot;,&quot;sale&quot;,&quot;pay&quot;,&quot;ai&quot;], &quot;default&quot;: &quot;dashboard&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;collapsed&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  state = { hovered: '' };

  itemStyle(key) {
    const active = (this.props.active || 'dashboard') === key;
    const col = !!this.props.collapsed;
    const layout = col ? 'justify-content:center;padding:13px 0;gap:0;' : 'justify-content:flex-start;padding:13px 16px;gap:12px;';
    const base = `display:flex;align-items:center;border-radius:13px;font-size:15px;text-decoration:none;transition:all .18s;${layout}`;
    if (active) return base + 'font-weight:700;color:#062A2E;background:linear-gradient(135deg,#24D7CB,#26D4A3);box-shadow:0 10px 22px -8px rgba(36,215,203,.55);';
    return base + 'font-weight:600;color:#A7B6C9;background:transparent;';
  }
  tip(key) {
    const show = !!this.props.collapsed && this.state.hovered === key;
    return `position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%) translateX(${show ? '0' : '-4px'});background:#0B2A46;color:#fff;font-size:13px;font-weight:700;padding:8px 13px;border-radius:9px;white-space:nowrap;box-shadow:0 10px 24px -6px rgba(0,0,0,.45);opacity:${show ? '1' : '0'};visibility:${show ? 'visible' : 'hidden'};pointer-events:none;transition:opacity .15s,transform .15s;z-index:60`;
  }

  renderVals() {
    const col = !!this.props.collapsed;
    const hov = k => () => this.setState({ hovered: k });
    return {
      containerStyle: `width:100%;height:100%;background:linear-gradient(180deg,#0B2447 0%,#07152A 100%);display:flex;flex-direction:column;padding:${col ? '20px 12px 18px' : '26px 16px 18px'};color:#fff;font-family:'Pretendard',-apple-system,sans-serif;overflow:visible`,
      logoWrapStyle: `display:flex;align-items:center;justify-content:${col ? 'center' : 'flex-start'};padding:${col ? '0 0 26px' : '0 10px 30px'};cursor:pointer;text-decoration:none`,
      logoFullStyle: `font-size:29px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;${col ? 'display:none' : 'display:inline'}`,
      logoMiniStyle: `${col ? 'display:block' : 'display:none'};width:42px;height:42px;object-fit:contain`,
      labelStyle: col ? 'display:none' : 'white-space:nowrap',
      sDash: this.itemStyle('dashboard'), sBay: this.itemStyle('bay'), sSale: this.itemStyle('sale'), sPay: this.itemStyle('pay'), sAi: this.itemStyle('ai'),
      tipDash: this.tip('dashboard'), tipBay: this.tip('bay'), tipSale: this.tip('sale'), tipPay: this.tip('pay'), tipAi: this.tip('ai'),
      hovDash: hov('dashboard'), hovBay: hov('bay'), hovSale: hov('sale'), hovPay: hov('pay'), hovAi: hov('ai'),
      hovClear: () => this.setState({ hovered: '' }),
      arrowStyle: col ? 'transform:rotate(180deg);transition:transform .25s' : 'transition:transform .25s',
      onToggle: () => window.dispatchEvent(new CustomEvent('yc:sidebar-toggle')),
      hrefDash: 'Young차 관리자 대시보드.dc.html',
      hrefBay: 'Young차 베이 관리.dc.html',
      hrefSale: 'Young차 타임세일 관리.dc.html',
      hrefPay: 'Young차 결제 정산 관리.dc.html',
      hrefAi: 'Young차 비전 AI 모니터링.dc.html',
    };
  }
}
</script>
</body>
</html>
